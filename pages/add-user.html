<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ACME Prod</title>
    <link rel="stylesheet" href="../style.css">
    <script type="module" src="../utils/auth.js"></script>
    <script type="module" src="../modules/addUser.js" defer></script>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="home.html">Home</a></li>
                <li><a href="users.html">Users</a></li>
                <li><a href="inventory.html">Inventory</a></li>
                <li><a href="#">Production</a></li>
            </ul>
        </nav>
    </header>
    <main id="container">
        <form id="add-user" action="" method="post">
            <h2>Add user</h2>
            <img class="icon" src="" alt="Icon user" />
            <div class="field">
                <label for="id">Identification</label>
                <input type="number" id="id" name="id" required />
            </div>
            <div class="field">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required />
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input class="input-pass" type="password" id="password" name="password" required />
            </div>

            <div class="box-btn">
                <button class="btn-submit" type="submit">Add</button>
            </div>
        </form>
    </main>
</body>

</html>
