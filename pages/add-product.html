<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario ACME</title>
    <link rel="stylesheet" href="../style.css" />
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/product.js" defer></script>
</head>
<main id="contenedor">
    <form id="add-product" action="" method="post">
        <h2>Agregar producto</h2>
        <img class="icon" src="../assets/usuario.png" alt="Icon user">
        <div class="field">
            <label for="name">Nombre:</label>
            <input class="input-txt" type="text" id="name" name="name" placeholder=":D" required>
        </div>
        <div class="field">
            <label for="quantity">Cantidad:</label>
            <input class="input-txt" type="number" id="quantity" name="quantity" placeholder=":D" required>
        </div>
        <div class="field">
            <label for="price">Precio:</label>
            <input class="input-number" type="number" id="price" name="price" placeholder=":X" required>
        </div>

        <div class="box-btn">
            <button class="btn-submit" type="submit">Agregar</button>
            <button class="btn-reset" type="reset">Limpiar</button>
        </div>
    </form>
</main>

<body>

</body>

</html>
