<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACME Prod</title>
    <link rel="stylesheet" href="../style.css">
    <script type="module" src="../utils/auth.js"></script>
    <script type="module" src="../modules/inventory.js" defer></script>
    <script type="module" src="../components/navbar.js" defer></script>
</head>

<body>
    <header>
        <nav-bar />
    </header>
    <main id="container">
        <h1>Inventory</h1>
        <div id="box-add-product">
            <h2>Add product</h2>
            <form id="add-product" action="" method="post">
                <div class="field">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="field">
                    <label for="supplier">Supplier</label>
                    <input type="text" id="supplier" name="supplier">
                </div>
                <div class="field">
                    <label for="stock">Quantity</label>
                    <input type="number" min="1" id="stock" name="stock" required>
                </div>
                <div class="field">
                    <span>Type: </span>
                    <label>Production <input type="radio" name="type-product" value="production"></label>
                    <label>Feedstock <input type="radio" name="type-product" value="feedstock" checked></label>
                </div>
                <div id="feedstock-box"></div>
                <div class="box-btn">
                    <button type="submit">Add</button>
                </div>
            </form>
        </div>
        <div class="search-box">
            <input id="search-input" type="text" name="search" placeholder="Search product...">
        </div>
        <div class="container-inventory">
            <h2>List inventory</h2>
            <table>
                <thead>
                    <th>Code</th>
                    <th>Name</th>
                    <th>Supplier</th>
                    <th>Type</th>
                    <th>Stock</th>
                    <th>Actions</th>
                </thead>
                <tbody id="list-products"></tbody>
            </table>
        </div>

        <div class="modal-overlay" id="view-product-modal" style="display: none;">
            <div class="modal-box">
                <button class="modal-close" type="button" aria-label="Cerrar">&times;</button>
                <h2>Product details</h2>
                <div class="modal-body">
                    <div class="modal-field">
                        <span class="modal-label">Code: </span>
                        <span class="modal-value" id="view-code"></span>
                    </div>
                    <div class="modal-field">
                        <span class="modal-label">Name: </span>
                        <span class="modal-value" id="view-name"></span>
                    </div>
                    <div class="modal-field">
                        <span class="modal-label">Supplier: </span>
                        <span class="modal-value" id="view-supplier"></span>
                    </div>
                    <div class="modal-field">
                        <span class="modal-label">Type: </span>
                        <span class="modal-value" id="view-type"></span>
                    </div>
                    <div class="modal-field">
                        <span class="modal-label">Stock: </span>
                        <span class="modal-value" id="view-stock"></span>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="edit-product-modal" style="display: none;">
            <div class="modal-box">
                <button class="modal-close" type="button" aria-label="Cerrar\">&times;</button>
                <h2>Edit product</h2>
                <form id="edit-product-form" action="" method="post">
                    <div class="field">
                        <label for="edit-name">Name</label>
                        <input type="text" id="edit-name" name="name" required="">
                    </div>
                    <div class="field">
                        <label for="edit-supplier">Supplier</label>
                        <input type="text" id="edit-supplier" name="supplier">
                    </div>
                    <div class="field">
                        <label for="edit-stock">Quantity</label>
                        <input type="number" id="edit-stock" name="stock" required="" disabled>
                    </div>
                    <div class="feedstock-box" id="edit-feedstock-box"></div>
                    <div class="box-btn">
                        <button type="submit" id="submit-edit">Save changes</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <footer></footer>
</body>

</html>
